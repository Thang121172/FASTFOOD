services:
  # db service removed to use shared database from WEB
  # redis service removed to use shared redis from WEB

  # Công cụ web quản trị DB (tùy chọn nhưng nên có)
  adminer:
    image: adminer:latest
    container_name: ff_adminer
    ports:
      - "8080:8080"
    # Removed depends_on db
    restart: unless-stopped
    networks:
      - fastfood_net

  backend:
    # ⚠️ LƯU Ý: Bạn đang dùng build context ./backend -> cần có file ./backend/Dockerfile
    # Nếu chưa có Dockerfile, bước build sẽ FAIL. (Mình sẽ cung cấp Dockerfile ở "file kế tiếp" khi bạn bảo.)
    build:
      context: ./backend
    container_name: ff_backend
    working_dir: /usr/src/app
    env_file:
      - .env
    environment:
      # ---- DB connection for Node app ----
      DB_HOST: fastfood_db # Connect to shared DB
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-fastfood}
      DB_USER: ${POSTGRES_USER:-app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-123456}

      # ---- JWT / admin bootstrap ----
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      ADMIN_SECRET: ${ADMIN_SECRET:-adminkey}

      # ---- Redis (rate limiting OTP) ----
      # Connect to shared Redis in WEB project (container_name: fastfood_redis)
      REDIS_URL: redis://fastfood_redis:6379

      # ---- Service port INSIDE container ----
      PORT: 8000

      # ---- Safety/dev flags ----
      ALLOW_SMOKE_SEED: "true"
      DEBUG_SHOW_OTP: "true"
      DEV_TOKEN: ${DEV_TOKEN:-testtoken}

      # ---- SMTP (khuyên chuyển qua .env thay vì hardcode ở compose) ----
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-no-reply@fastfood.local}

    ports:
      # host:container - Dùng port 8002 để tránh conflict với WEB backend (8000)
      - "8002:8000"

    # Chạy migrate trước rồi start server
    command: sh -c "npm run migrate && node index.js"

    restart: unless-stopped
    networks:
      - fastfood_net

  cleanup:
    image: node:20
    container_name: ff_cleanup
    working_dir: /app
    volumes:
      - ./backend:/app
    # Removed depends_on db
    environment:
      DB_HOST: fastfood_db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-fastfood}
      DB_USER: ${POSTGRES_USER:-app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    command: sh -c "node scripts/cleanup_revoked.js"
    restart: "no" # job 1 lần; có thể dùng cron riêng nếu cần
    networks:
      - fastfood_net

volumes:
  db_data:


networks:
  fastfood_net:
    external: true
