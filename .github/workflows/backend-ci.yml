name: FastFood Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-nodejs:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./APP/backend

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ./APP/backend/package-lock.json
        
    - name: Install dependencies
      run: npm ci || npm install
      
    - name: Check Syntax (Dry Run)
      run: node -c index.js

  build-and-test-django:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./WEB/backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Syntax Check
      run: python -m py_compile manage.py
